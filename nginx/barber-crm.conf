# BarberCRM — доступ по IP:8080
# Файл: /etc/nginx/sites-available/barber-crm
# Симлинк: ln -s /etc/nginx/sites-available/barber-crm /etc/nginx/sites-enabled/barber-crm
#
# ВАЖНО: этот server слушает порт 8080 и НЕ конфликтует с основным сайтом на 80/443.
# CRM доступна по адресу: http://166.1.201.183:8080

server {
    listen 8080;
    server_name _;

    root /var/www/barber-crm/frontend;
    index index.html;

    # Максимальный размер запроса (для загрузки отчётов)
    client_max_body_size 10m;

    # SPA — все пути отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API → Docker backend (127.0.0.1:8100)
    location /api/ {
        proxy_pass http://127.0.0.1:8100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Кеширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
    }
}
