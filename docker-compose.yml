version: '3.8'

services:
  backend:
    build: ./backend
    container_name: barber_backend
    restart: unless-stopped
    environment:
      DB_PATH: /app/data/barbercrm.db
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      REPORT_EMAIL_TO: ${REPORT_EMAIL_TO:-}
      SMTP_HOST: ${SMTP_HOST:-mail.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
    volumes:
      - barber_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: barber_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

  telegram-bot:
    build: ./telegram-bot
    container_name: barber_telegram_bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BACKEND_URL: http://barber_backend:8000
      BOT_ACCESS_PASSWORD: ${BOT_ACCESS_PASSWORD:-}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  barber_data:
    driver: local

networks:
  default:
    name: barber_network
